name: Build dm3q kernel

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Kernel build mode
        required: true
        default: full
        type: choice
        options:
          - full
          - common

permissions:
  contents: read

concurrency:
  group: dm3q-kernel-${{ github.ref }}-${{ inputs.mode }}
  cancel-in-progress: false

jobs:
  build:
    name: dm3q ${{ inputs.mode }} build
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Free up workflow space
        run: |
          curl -L -o util_free_space.sh https://raw.githubusercontent.com/apache/arrow/main/ci/scripts/util_free_space.sh
          chmod +x util_free_space.sh
          ./util_free_space.sh

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            bc \
            bison \
            build-essential \
            cpio \
            flex \
            git \
            libelf-dev \
            libncurses5 \
            libssl-dev \
            libtinfo5 \
            lz4 \
            python3 \
            rsync \
            unzip \
            wget \
            xz-utils \
            zstd

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Restore Samsung toolchain
        uses: actions/cache@v4
        with:
          path: kernel_platform/prebuilts
          key: samsung-sm8550-toolchain-r450784e-v1

      - name: Build dm3q kernel
        env:
          JOBS: ${{ runner.arch == 'X64' && '4' || '2' }}
        run: ./build.sh "${{ inputs.mode }}"

      - name: Collect kernel artifacts
        shell: bash
        run: |
          set -euo pipefail

          mode="${{ inputs.mode }}"
          artifact_dir="out/upload/${mode}"
          mkdir -p "${artifact_dir}"

          copy_if_present() {
            local file
            for file in "$@"; do
              if [[ -f "${file}" ]]; then
                cp "${file}" "${artifact_dir}/"
              fi
            done
          }

          if [[ "${mode}" == "common" ]]; then
            dist="out/common-dist"
            copy_if_present \
              "${dist}/Image" \
              "${dist}/Image.gz" \
              "${dist}/Image.lz4" \
              "${dist}/boot.img" \
              "${dist}/system_dlkm.img" \
              "${dist}/gki-info.txt" \
              "${dist}/System.map" \
              "${dist}/vmlinux.symvers" \
              "${dist}/modules.builtin" \
              "${dist}/modules.builtin.modinfo" \
              "${dist}/zram.ko" \
              "${dist}/zsmalloc.ko" \
              "${dist}/abi.report.short"
          else
            dist="out/msm-kalama-kalama-gki/dist"
            copy_if_present \
              "${dist}/Image" \
              "${dist}/Image.gz" \
              "${dist}/Image.lz4" \
              "${dist}/boot.img" \
              "${dist}/vendor_boot.img" \
              "${dist}/vendor_dlkm.img" \
              "${dist}/init_boot.img" \
              "${dist}/dtb.img" \
              "${dist}/dtbo.img" \
              "${dist}/system_dlkm.img" \
              "${dist}/System.map" \
              "${dist}/Module.symvers" \
              "${dist}/vmlinux.symvers" \
              "${dist}/vendor_dlkm.modules.load" \
              "${dist}/vendor_dlkm.modules.blocklist" \
              "${dist}/system_dlkm.modules.load" \
              "${dist}/system_dlkm.modules.blocklist"

            mkdir -p "${artifact_dir}/dtbs"
            for file in "${dist}"/*.dtb "${dist}"/*.dtbo; do
              [[ -f "${file}" ]] || continue
              cp "${file}" "${artifact_dir}/dtbs/"
            done

            packaged="out/msm-kalama-kalama-gki/packaged"
            mkdir -p "${artifact_dir}/packaged"
            for file in "${packaged}/boot.img" \
                        "${packaged}/vendor_boot.img" \
                        "${packaged}/vendor_dlkm.img"; do
              [[ -f "${file}" ]] || continue
              cp "${file}" "${artifact_dir}/packaged/"
            done
          fi

          find "${artifact_dir}" -type f -printf '%P\n' | sort

      - name: Upload kernel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dm3q-${{ inputs.mode }}-${{ github.sha }}
          path: out/upload/${{ inputs.mode }}/
          if-no-files-found: warn
          compression-level: 0
          retention-days: 7
